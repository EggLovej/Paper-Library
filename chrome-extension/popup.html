<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>ArXiv Sieve</title>
  </head>
  <body>
    <main class="popup-shell">
      <p class="kicker">ArXiv Sieve</p>
      <h1>Add current paper</h1>
      <p id="page-status" class="muted">Checking current tab...</p>

      <label for="rating">Verdict</label>
      <select id="rating"></select>

      <button id="submit" type="button">Add to Sieve</button>
      <button id="settings" type="button" class="secondary">Settings</button>
      <p id="status" class="status" role="status"></p>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
